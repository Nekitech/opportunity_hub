# Базовый compose = merge-база для dev (дополняется docker-compose.dev.override.yml).
# Прод-деплой использует отдельный docker-compose.prod.yml. web в прод уезжает на
# Vercel, поэтому здесь его нет (в dev он добавляется override'ом).
services:
  admin:
    build:
      dockerfile: ./apps/admin/Dockerfile
      context: ./
    restart: always
    ports:
      - "8081:5000"

  backend:
    build:
      dockerfile: ./apps/api/Dockerfile
      context: ./
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres

  parsers:
    build:
      dockerfile: ./apps/parsers/Dockerfile
      context: ./
    restart: always
    ports:
      - '3333:3333'


  postgres:
    image: postgres:16
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  nginx:
    volumes:
      - nginx_config:/etc/nginx/conf.d
    ports:
      - 80:80
      - 443:443
    env_file:
      - .env
    build:
      context: ./nginx
      dockerfile: docker/Dockerfile

volumes:
  nginx_config:
  pgdata:
